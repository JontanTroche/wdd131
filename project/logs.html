<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A page where you can find a complete record of every practice session, categorized by date, practice category, practice duration, and user-provided notes.">
    <meta name="author" content="Jonatan Troche Almedia">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/shredlog.css">
    <script src="scripts/storage.js"></script>
    <script src="scripts/logs.js" defer></script>
    <title>ShredLog | Dashboard</title>
</head>
<body>
    <header>
        <div class="logo">
            <a href="shredLog-home.html">
                <h1>ShredLog</h1>
            </a>
        </div>
        <nav>
            <ul>
                <li><a href="shredlog-home.html">Dashboard</a></li>
                <li><a href="timer.html">Practice</a></li>
                <li><a href="logs.html">History</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="history-filter">
            <h2>Session History</h2>
            <div class="filter-controls">
                <label for="filter-category">Filter by Category:</label>
                <select id="filter-category">
                    <option value="All">All Categories</option>
                    <option value="Scales">Scales & Technique</option>
                    <option value="Repertoire">Song Repertoire</option>
                    <option value="Theory">Music Theory</option>
                    <option value="Improvisation">Improvisation</option>
                </select>
            </div>
        </section>

        <section id="history-table">
            <h3 class="visually-hidden">Session List</h3>
            <div class="table-container">
                <table id="logs-table">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Category</th>
                            <th>Duration</th>
                            <th>Notes</th>
                        </tr>
                    </thead>
                    <tbody>
                    </tbody>
                </table>
            </div>
            <div style="margin-top: 20px;">
                <button onclick="StorageController.clearAll()" style="background-color: #555;">Clear All History</button>
            </div>
        </section>
    </main>
    <footer>
        <p>&copy;<span id="currentyear"></span> Jonatan Troche Almedia. La Paz, Bolivia </p>
        <p id="lastmodified"></p>
        <a href="references.html">Citations/References</a>.
    </footer>
</body>
</html>
