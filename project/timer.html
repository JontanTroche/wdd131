<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ShredLog Dashboard - The main page of this site—where a practice session is recorded—is the page where the user will log each session.">
    <meta name="author" content="Jonatan Troche Almedia">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/shredLog.css">
    <script src="scripts/storage.js"></script>
    <script src="scripts/timer.js" defer></script>
    <title>ShredLog | Dashboard</title>
</head>
    <body>
        <header>
            <div class="logo">
                <a href="shredLog-home.html">
                    <h1>ShredLog</h1>
                </a>
            </div>
        <nav>
            <ul>
                <li><a href="shredLog-home.html">Dashboard</a></li>
                <li><a href="timer.html">Practice</a></li>
                <li><a href="logs.html">History</a></li>
            </ul>
        </nav>
        </header>
        <main>
            <section id="timer-section">
            <h2>Session Timer</h2>
            <div id="timer-display">00:00:00</div>
            
            <div class="timer-controls">
                <button id="start-btn">Start Session</button>
                <button id="stop-btn" disabled>Stop Session</button>
            </div>
        </section>

        <section id="session-info">
            <h3>Session Details</h3>
            <form id="session-form">
                <div class="form-group">
                    <label for="category">Practice Category:</label>
                    <select id="category" name="category" required>
                        <option value="Scales">Scales & Technique</option>
                        <option value="Repertoire">Song Repertoire</option>
                        <option value="Theory">Music Theory</option>
                        <option value="Improvisation">Improvisation</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="notes">Notes (What did you work on?):</label>
                    <textarea id="notes" name="notes" rows="4" placeholder="Example: Worked on the 16th note triplets in Under a Glass Moon solo..."></textarea>
                </div>

                <button type="submit" id="save-btn">Save Session Data</button>
            </form>
        </section>
        </main>
        <footer>
            <p>&copy;<span id="currentyear"></span> Jonatan Troche Almedia. La Paz, Bolivia </p>
            <p id="lastmodified"></p>
            <a href="references.html">Citations/References</a>.
        </footer>
    </body>
</html>
